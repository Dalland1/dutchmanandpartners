<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The New Agent Regulations (FFAR) | Dutchman & Partners</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/Dalland1/logo/10919cf56aab995c332ec288c263056416f7e422/Perfect%20logo%20(1).png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #030508; --bg-surface: #0a0d14; --gold-primary: #D4AF37;
            --text-main: #E2E8F0; --text-muted: #8F9BA8;
            --font-display: 'Cinzel', serif; --font-body: 'Manrope', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); color: var(--text-main); background-color: var(--bg-deep); line-height: 1.8; -webkit-font-smoothing: antialiased;}
        
        /* Header */
        header { background: rgba(3, 5, 8, 0.95); padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100;}
        .container { max-width: 1000px; margin: 0 auto; padding: 0 5%; }
        .nav-wrapper { display: flex; justify-content: space-between; align-items: center; max-width: 1440px; margin: 0 auto; padding: 0 5%;}
        .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo-img { height: 40px; filter: brightness(0) invert(1); }
        .firm-name { font-family: var(--font-display); font-size: clamp(1rem, 2vw, 1.2rem); color: #fff; letter-spacing: 2px; }
        .back-btn { color: var(--text-main); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .back-btn:hover { color: var(--gold-primary); }

        /* Article Layout */
        .article-header { padding: 80px 0 40px; text-align: center; }
        .article-meta { color: var(--gold-primary); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; display: inline-block; }
        h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 4rem); color: #fff; line-height: 1.2; margin-bottom: 40px; text-transform: uppercase;}
        .hero-img { width: 100%; height: 50vh; object-fit: cover; margin-bottom: 60px; filter: grayscale(20%); border: 1px solid rgba(255,255,255,0.05);}

        /* Text Content */
        .content { font-size: 1.1rem; color: var(--text-muted); max-width: 800px; margin: 0 auto 100px; }
        .content p { margin-bottom: 30px; }
        .content h2 { font-family: var(--font-display); color: #fff; font-size: clamp(1.5rem, 3vw, 2rem); margin: 60px 0 25px; text-transform: uppercase; letter-spacing: 1px; }

        footer { padding: 40px 0; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;}
    </style>
</head>
<body>
